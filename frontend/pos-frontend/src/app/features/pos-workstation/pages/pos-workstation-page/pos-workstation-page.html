<section class="pos-page">
  <header class="pos-page__header">
    <div>
      <span class="eyebrow">Estación de venta</span>
      <h1>POS Workstation</h1>
      <p>Escaneo rápido, venta activa y cierre con teclado.</p>
    </div>

    <div class="header-actions">
      @if (canReadReports) {
        <p-button
          label="Ventas recientes"
          icon="pi pi-receipt"
          severity="secondary"
          [outlined]="true"
          (onClick)="recentSalesVisible.set(true)"
        ></p-button>
      }
      <span class="shortcut-hint">F2 buscar · F9 cobrar · F12 confirmar</span>
    </div>
  </header>

  @if (!canSell && !canReadReports) {
    <p-message severity="warn" text="No tienes permisos para usar la estación POS."></p-message>
  } @else {
    <div class="workstation-shell">
      @if (canSell) {
        <main class="sale-flow">
          <app-product-search-panel
            [products]="filteredProducts()"
            [loading]="productsLoading()"
            [errorMessage]="productsError()"
            [inventoryAvailable]="inventoryAvailable()"
            [inventoryErrorMessage]="inventoryError()"
            [searchTerm]="searchTerm()"
            [canSell]="canSell"
            (searchTermChange)="onSearchTermChange($event)"
            (submitSearch)="submitSearchTerm()"
            (addProduct)="addProduct($event)"
            (quickSearch)="quickSearchVisible.set(true)"
          ></app-product-search-panel>
        </main>

        <aside class="active-sale">
          <app-cart-workstation
            [items]="cart()"
            [subtotal]="subtotal()"
            [total]="total()"
            [notes]="notes()"
            [canCheckout]="canSell"
            [inventoryAvailable]="inventoryAvailable()"
            [activeProductId]="activeCartProductId()"
            (updateQuantity)="updateQuantity($event)"
            (updateUnitPrice)="updateUnitPrice($event)"
            (removeItem)="removeItem($event)"
            (notesChange)="notes.set($event)"
            (selectLine)="selectCartLine($event)"
            (checkout)="openCheckoutDialog()"
          ></app-cart-workstation>
        </aside>
      }

      @if (!canSell && canReadReports) {
        <div class="reports-only">
          <p-button label="Abrir ventas recientes" icon="pi pi-receipt" (onClick)="recentSalesVisible.set(true)"></p-button>
        </div>
      }
    </div>
  }

  <p-toast></p-toast>

  <p-dialog
    header="Ventas recientes"
    [modal]="true"
    [visible]="recentSalesVisible()"
    [style]="{ width: '52rem', maxWidth: '96vw' }"
    (visibleChange)="recentSalesVisible.set($event)"
  >
    <app-recent-sales-panel
      [sales]="sales()"
      [loading]="salesLoading()"
      [errorMessage]="salesError()"
      [canVoid]="canVoid"
      (refresh)="loadSales()"
      (viewDetail)="openSaleDetailFromRecent($event)"
      (startVoid)="openVoidDialogFromRecent($event)"
    ></app-recent-sales-panel>
  </p-dialog>

  <app-quick-product-search-dialog
    [visible]="quickSearchVisible()"
    [products]="allProducts()"
    [inventoryAvailable]="inventoryAvailable()"
    (visibleChange)="onQuickSearchVisibleChange($event)"
    (selectProduct)="handleQuickProductSelection($event)"
    (unavailableProduct)="handleUnavailableProductSelection($event)"
  ></app-quick-product-search-dialog>

  <app-checkout-confirm-dialog
    [visible]="checkoutVisible()"
    [loading]="checkoutLoading()"
    [itemCount]="itemCount()"
    [total]="total()"
    [notes]="notes()"
    (visibleChange)="checkoutVisible.set($event)"
    (confirm)="confirmCheckout()"
  ></app-checkout-confirm-dialog>

  <app-sale-detail-dialog
    [visible]="saleDetailVisible()"
    [sale]="selectedSale()"
    (visibleChange)="saleDetailVisible.set($event)"
  ></app-sale-detail-dialog>

  <app-void-sale-dialog
    [visible]="voidVisible()"
    [loading]="voidLoading()"
    (visibleChange)="voidVisible.set($event)"
    (confirmVoid)="confirmVoid($event)"
  ></app-void-sale-dialog>
</section>
